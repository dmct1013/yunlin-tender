<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雲林縣採購監控</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f0eb;
  --surface: #ffffff;
  --surface2: #f8f7f4;
  --border: #e4e0d8;
  --border2: #ccc8be;
  --text: #1a1816;
  --text2: #5c5750;
  --text3: #9c9890;
  --accent: #b84c1a;
  --accent2: #d4611f;
  --accent-bg: #fdf1eb;
  --accent-border: #e8b89a;
  --blue: #1a5fa8;
  --blue-bg: #eef4fc;
  --green: #1a7a3e;
  --green-bg: #edf7f1;
  --amber: #a06010;
  --amber-bg: #fdf6e3;
  --red: #b52020;
  --red-bg: #fef2f2;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow: 0 2px 8px rgba(0,0,0,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

.layout { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

.logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.logo-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
}
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

.nav-group { padding: 14px 10px 6px; }
.nav-group-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: all .12s;
  margin-bottom: 1px;
  user-select: none;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .5; flex-shrink: 0; }
.nav-item.active .nav-dot { opacity: 1; }
.nav-count {
  margin-left: auto;
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 20px;
  background: var(--border);
  color: var(--text3);
}
.nav-item.active .nav-count { background: var(--accent-border); color: var(--accent); }

.sidebar-footer {
  margin-top: auto;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
}
.sidebar-footer label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 5px; }
.api-input {
  width: 100%;
  padding: 6px 9px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 11px;
  font-family: monospace;
  background: var(--surface2);
  color: var(--text);
}
.api-input:focus { outline: none; border-color: var(--accent-border); }
.api-status { font-size: 11px; margin-top: 4px; min-height: 16px; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.topbar-info { flex: 1; }
.topbar-title { font-size: 15px; font-weight: 500; }
.topbar-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border-radius: 7px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  transition: all .12s;
}
.btn:hover { background: var(--surface2); color: var(--text); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: white; font-weight: 500; }
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn-primary:disabled { opacity: .4; pointer-events: none; }
.btn-sm { padding: 5px 11px; font-size: 12px; }

.content { flex: 1; overflow-y: auto; padding: 20px 24px; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 12px 14px;
}
.stat .lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.stat .val { font-size: 22px; font-weight: 700; color: var(--text); }
.stat .sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

.filter-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 12px 14px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
}
.filter-bar input[type=text] {
  flex: 1;
  min-width: 150px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  background: var(--surface2);
  color: var(--text);
  font-family: inherit;
}
.filter-bar input[type=text]:focus { outline: none; border-color: var(--accent-border); }
.filter-bar select {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  background: var(--surface2);
  color: var(--text);
  font-family: inherit;
  height: 34px;
}
.filter-sep { width: 1px; background: var(--border); height: 20px; }

.sel-bar {
  background: var(--amber-bg);
  border: 1px solid #e8c870;
  border-radius: 9px;
  padding: 9px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--amber);
  margin-bottom: 10px;
}
.sel-bar .sp { flex: 1; }

.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .04em;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr { transition: background .1s; cursor: pointer; }
tbody tr:hover { background: var(--surface2); }
tbody tr + tr { border-top: 1px solid var(--border); }
tbody td { padding: 11px 12px; vertical-align: middle; }

.td-title .name { font-weight: 500; font-size: 13px; line-height: 1.4; }
.td-title .org { font-size: 11px; color: var(--text3); margin-top: 2px; }
.town-tag { font-size: 12px; color: var(--text2); white-space: nowrap; }
.budget { font-size: 13px; white-space: nowrap; font-weight: 500; }
.date-cell { font-size: 12px; color: var(--text3); white-space: nowrap; }

.badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
  font-weight: 500;
}
.badge-activity { background: var(--accent-bg); color: var(--accent); }
.badge-other { background: var(--surface2); color: var(--text3); }
.badge-yes { background: var(--green-bg); color: var(--green); }
.badge-no { background: var(--red-bg); color: var(--red); }
.badge-maybe { background: var(--amber-bg); color: var(--amber); }

.btn-view {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--accent-border);
  color: var(--accent);
  background: var(--accent-bg);
  cursor: pointer;
  font-family: inherit;
  transition: all .12s;
  white-space: nowrap;
}
.btn-view:hover { background: var(--accent); color: white; }

.chk { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }

.empty-state {
  padding: 48px;
  text-align: center;
  color: var(--text3);
  font-size: 14px;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.2);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: auto; }

.panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 560px;
  max-width: 95vw;
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: -4px 0 20px rgba(0,0,0,.1);
  z-index: 101;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.panel.open { transform: none; }

.panel-head {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-head .close {
  float: right;
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--text3);
  line-height: 1;
}
.panel-head .close:hover { color: var(--text); }
.panel-head h2 { font-size: 14px; font-weight: 500; padding-right: 24px; line-height: 1.5; }
.panel-head .meta { font-size: 12px; color: var(--text3); margin-top: 4px; }

.panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all .12s;
}
.panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

.panel-body { flex: 1; overflow-y: auto; padding: 18px 20px; }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.info-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 9px 12px;
}
.info-item .lbl { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
.info-item .val { font-size: 13px; font-weight: 500; }

.section-lbl {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 8px;
  margin-top: 14px;
}

/* 歷史得標表格 */
.history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-bottom: 4px;
}
.history-table th {
  background: var(--surface2);
  padding: 6px 10px;
  text-align: left;
  font-size: 11px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
}
.history-table td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.history-table tr:last-child td { border-bottom: none; }
.history-wrap {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 14px;
}
.history-empty {
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text3);
  font-style: italic;
}

.analysis-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  font-size: 13px;
  line-height: 1.85;
  white-space: pre-wrap;
  color: var(--text);
}

.verdict-banner {
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  font-weight: 500;
}
.verdict-yes { background: var(--green-bg); color: var(--green); }
.verdict-no { background: var(--red-bg); color: var(--red); }
.verdict-maybe { background: var(--amber-bg); color: var(--amber); }

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-row { display: flex; align-items: center; gap: 10px; padding: 16px 0; font-size: 13px; color: var(--text3); }

.ext-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--blue);
  text-decoration: none;
  margin-top: 10px;
}
.ext-link:hover { text-decoration: underline; }

.page-loading {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  z-index: 200;
}
.page-loading .sp { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
.page-loading p { font-size: 14px; color: var(--text3); }

.token-pill {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text3);
}

.hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  cursor: pointer;
  padding: 6px 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 7px;
  flex-shrink: 0;
}
.hamburger span {
  display: block;
  width: 18px;
  height: 2px;
  background: var(--text2);
  border-radius: 2px;
  transition: all .2s;
}

.sidebar-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.35);
  z-index: 140;
  cursor: pointer;
}
.sidebar-backdrop.active { display: block; }

@media (max-width: 1024px) {
  .sidebar { width: 190px; min-width: 190px; }
}

@media (max-width: 768px) {
  .hamburger { display: flex; }
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 150;
    width: 260px;
    min-width: 260px;
    transform: translateX(-100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    box-shadow: 4px 0 20px rgba(0,0,0,.12);
  }
  .sidebar.mobile-open { transform: none; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .topbar { padding: 10px 14px; gap: 8px; flex-wrap: wrap; }
  .topbar-info { min-width: 0; }
  .topbar-title { font-size: 14px; }
  .topbar-sub { font-size: 11px; }
  .content { padding: 12px 14px; }
  .filter-bar { flex-direction: column; align-items: stretch; gap: 8px; }
  .filter-bar input[type=text] { min-width: unset; width: 100%; }
  .filter-bar select { width: 100%; }
  .filter-sep { display: none; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 620px; }
  .panel { width: 100%; max-width: 100%; }
  .info-grid { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
  /* 隱藏次要欄位 */
  table thead th:nth-child(3),
  table tbody td:nth-child(3),
  table thead th:nth-child(6),
  table tbody td:nth-child(6),
  table thead th:nth-child(7),
  table tbody td:nth-child(7) { display: none; }
  table { min-width: 380px; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat .val { font-size: 18px; }
  .sel-bar { flex-wrap: wrap; gap: 6px; }
  .sel-bar .sp { display: none; }
}
</style>
</head>
<body>

<div id="lock-screen" style="position:fixed;inset:0;background:#f2f0eb;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;">
  <div style="background:#fff;border:1px solid #e4e0d8;border-radius:14px;padding:36px 40px;width:320px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08)">
    <div style="font-family:'Noto Serif TC',serif;font-size:20px;font-weight:700;color:#1a1816;margin-bottom:6px">雲林縣採購監控</div>
    <div style="font-size:13px;color:#9c9890;margin-bottom:24px">請輸入密碼</div>
    <input id="pw-input" type="password" placeholder="密碼" onkeydown="if(event.key==='Enter')checkPw()"
      style="width:100%;padding:10px 14px;border:1px solid #e4e0d8;border-radius:8px;font-size:14px;font-family:inherit;background:#f8f7f4;color:#1a1816;outline:none;box-sizing:border-box;margin-bottom:10px">
    <div id="pw-error" style="font-size:12px;color:#b52020;margin-bottom:10px;min-height:16px"></div>
    <button onclick="checkPw()"
      style="width:100%;padding:10px;background:#b84c1a;border:none;border-radius:8px;color:white;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer">
      進入
    </button>
  </div>
</div>

<script>
(function(){
  const HASH = '56116e9ca720684c714b68f1420dde3bc1a492e9b61f58c1a036d4d2d1c12df1';
  function sha256(str) {
    const buf = new TextEncoder().encode(str);
    return crypto.subtle.digest('SHA-256', buf).then(h =>
      Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')
    );
  }
  function checkPw() {
    const pw = document.getElementById('pw-input').value;
    sha256(pw).then(hash => {
      if (hash === HASH) {
        sessionStorage.setItem('auth', '1');
        document.getElementById('lock-screen').style.display = 'none';
      } else {
        document.getElementById('pw-error').textContent = '密碼錯誤，請再試一次';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    });
  }
  window.checkPw = checkPw;
  if (sessionStorage.getItem('auth') !== '1') {
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('pw-input').focus();
    });
  } else {
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('lock-screen').style.display = 'none';
    });
  }
})();
</script>

<div class="page-loading" id="pg-loading">
  <div class="sp"></div>
  <p>載入標案資料中...</p>
</div>

<div class="layout" id="app" style="display:none">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-title">雲林縣<br>採購監控</div>
      <div class="logo-sub" id="updated-at">載入中...</div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">篩選</div>
      <div class="nav-item active" id="nav-all" onclick="setView('all')">
        <span class="nav-dot"></span> 全部標案
        <span class="nav-count" id="nc-all">0</span>
      </div>
      <div class="nav-item" id="nav-activity" onclick="setView('activity')">
        <span class="nav-dot"></span> 活動相關
        <span class="nav-count" id="nc-activity">0</span>
      </div>
      <div class="nav-item" id="nav-analyzed" onclick="setView('analyzed')">
        <span class="nav-dot"></span> 已分析
        <span class="nav-count" id="nc-analyzed">0</span>
      </div>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">鄉鎮</div>
      <div id="town-nav"></div>
    </div>

    <div class="sidebar-footer">
      <label>Claude API Key（選填，用於深度分析）</label>
      <input class="api-input" type="password" id="api-key" placeholder="sk-ant-..." oninput="saveKey()">
      <div class="api-status" id="api-status"></div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="開啟選單">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-info">
        <div class="topbar-title" id="view-title">全部勞務標案</div>
        <div class="topbar-sub" id="view-sub"></div>
      </div>
      <span class="token-pill" id="token-pill" style="display:none">Token：0</span>
      <button class="btn btn-sm" onclick="loadData()">↺ 重新載入</button>
    </div>

    <div class="content">
      <div class="stats">
        <div class="stat"><div class="lbl">勞務標案總數</div><div class="val" id="s-total">0</div><div class="sub">等標期內</div></div>
        <div class="stat"><div class="lbl">活動相關</div><div class="val" id="s-activity">0</div></div>
        <div class="stat"><div class="lbl">已勾選</div><div class="val" id="s-sel">0</div></div>
        <div class="stat"><div class="lbl">已 AI 分析</div><div class="val" id="s-done">0</div></div>
      </div>

      <div class="filter-bar">
        <input type="text" id="kw" placeholder="搜尋標案名稱或機關..." oninput="renderTable()">

function parseAnalysis(text) {
  if (!text) return null;
  const m = text.match(/【投標建議】\s*(.+)/) || text.match(/【競標建議】\s*(.+)/);
  const label = m ? m[1].trim() : '審慎評估';
  const verdict = label.includes('不建議') ? 'no' : label.includes('建議投標') ? 'yes' : 'maybe';
  return { text, label, verdict };
}

function getFiltered() {
  const kw = document.getElementById('kw').value.trim().toLowerCase();
  const ft = document.getElementById('f-town').value;
  const fb = document.getElementById('f-budget').value;

  return ALL.filter(t => {
    if (currentView === 'activity' && !t.is_activity) return false;
    if (currentView === 'analyzed' && !aiResults[t.id]) return false;
    if (currentTown && t.town !== currentTown) return false;
    if (ft && t.town !== ft) return false;
    if (kw && !t.title.toLowerCase().includes(kw) && !t.org.includes(kw)) return false;
    if (fb) {
      const b = parseBudget(t.budget);
      if (fb === '100' && b > 1000000) return false;
      if (fb === '500' && (b <= 1000000 || b > 5000000)) return false;
      if (fb === '1000' && (b <= 5000000 || b > 10000000)) return false;
      if (fb === '9999' && b <= 10000000) return false;
    }
    return true;
  });
}

function parseBudget(s) {
  if (!s) return 0;
  return parseInt(s.replace(/[^0-9]/g, '')) || 0;
}

function setView(v) {
  currentView = v;
  currentTown = '';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + v)?.classList.add('active');
  document.querySelectorAll('.town-nav-item').forEach(el => el.classList.remove('active'));
  updateViewTitle();
  renderTable();
}

function filterTown(town) {
  currentTown = town;
  currentView = 'all';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.town-nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-town-' + town)?.classList.add('active');
  updateViewTitle();
  renderTable();
}

function updateViewTitle() {
  const titles = { all: '全部勞務標案', activity: '活動相關標案', analyzed: '已 AI 分析' };
  document.getElementById('view-title').textContent = currentTown
    ? currentTown + ' 標案' : (titles[currentView] || '全部標案');
}

  const rows = getFiltered();
  const tbody = document.getElementById('tbody');
  document.getElementById('sel-bar').style.display = ALL.length ? 'flex' : 'none';
  document.getElementById('view-sub').textContent = `顯示 ${rows.length} 筆`;

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">${ALL.length ? '無符合條件的標案' : '尚無資料，請執行 pcc_crawler.py'}</div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(t => {
    const ai = aiResults[t.id];
    const isChk = selected.has(t.id);
    const actBadge = t.is_activity
      ? '<span class="badge badge-activity">活動</span>'
      : '<span class="badge badge-other">一般</span>';
    const aiBadge = ai
      ? `<span class="badge badge-${ai.verdict}">${ai.label}</span>`
      : '—';
    const histBadge = (t.history && t.history.length > 0)
      ? `<span style="font-size:10px;color:var(--blue);margin-left:4px">●${t.history.length}年記錄</span>`
      : '';

    return `<tr onclick="openPanel('${t.id}')">
      <td onclick="event.stopPropagation()"><input type="checkbox" class="chk" ${isChk?'checked':''} onchange="toggleSel('${t.id}',this.checked)"></td>
      <td class="td-title">
        <div class="name">${t.title}${histBadge}</div>
        <div class="org">${t.org}</div>
      </td>
      <td class="town-tag">${t.town}</td>
      <td class="budget">NT$ ${t.budget}</td>
      <td class="date-cell">${t.date || '—'}</td>
      <td class="date-cell">${t.deadline || '—'}</td>
      <td>${actBadge}</td>
      <td>${aiBadge}</td>
      <td onclick="event.stopPropagation()"><button class="btn-view" onclick="openPanel('${t.id}')">查看</button></td>
    </tr>`;
  }).join('');

  updateSelCount();
}

function toggleSel(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  updateSelCount();
}
function toggleAll(checked) {
  getFiltered().forEach(t => checked ? selected.add(t.id) : selected.delete(t.id));
  renderTable();
}
function selectAll() {
  getFiltered().forEach(t => selected.add(t.id));
  document.getElementById('chk-all').checked = true;
  renderTable();
}
function clearSel() {
  selected.clear();
  document.getElementById('chk-all').checked = false;
  renderTable();
}
function updateSelCount() {
  const n = selected.size;
  document.getElementById('s-sel').textContent = n;
  document.getElementById('sel-label').textContent = `已選 ${n} 筆`;
  document.getElementById('btn-bulk').disabled = n === 0;
}

function updateStats() {
  document.getElementById('s-total').textContent = ALL.length;
  document.getElementById('s-activity').textContent = ALL.filter(t => t.is_activity).length;
  document.getElementById('s-done').textContent = Object.keys(aiResults).length;
  document.getElementById('nc-all').textContent = ALL.length;
  document.getElementById('nc-activity').textContent = ALL.filter(t => t.is_activity).length;
  document.getElementById('nc-analyzed').textContent = Object.keys(aiResults).length;
}

function buildTownFilter() {
  const towns = [...new Set(ALL.map(t => t.town))].sort();
  const counts = {};
  ALL.forEach(t => counts[t.town] = (counts[t.town] || 0) + 1);

  document.getElementById('town-nav').innerHTML = towns.map(town => `
    <div class="nav-item town-nav-item" id="nav-town-${town}" onclick="filterTown('${town}')">
      <span class="nav-dot"></span> ${town}
      <span class="nav-count">${counts[town]}</span>
    </div>`).join('');

  const sel = document.getElementById('f-town');
  towns.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
}

function openPanel(id) {
  currentTender = ALL.find(t => t.id === id);
  if (!currentTender) return;
  document.getElementById('p-title').textContent = currentTender.title;
  document.getElementById('p-meta').textContent =
    currentTender.org + '　|　公告：' + (currentTender.date || '—') + '　截止：' + (currentTender.deadline || '—');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  switchTab(0);
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.panel-tab').forEach((el, i) => el.classList.toggle('active', i === idx));
  if (!currentTender) return;
  if (idx === 0) renderTabInfo();
  else if (idx === 1) renderTabAI();
  else if (idx === 2) renderTabHistory();
}

function renderTabInfo() {
  const t = currentTender;
  const ai = aiResults[t.id];
  document.getElementById('panel-body').innerHTML = `
    ${ai ? `<div class="verdict-banner verdict-${ai.verdict}">${ai.label}</div>` : ''}
    <div class="info-grid">
      <div class="info-item"><div class="lbl">機關</div><div class="val">${t.org}</div></div>
      <div class="info-item"><div class="lbl">鄉鎮</div><div class="val">${t.town}</div></div>
      <div class="info-item"><div class="lbl">預算金額</div><div class="val">NT$ ${t.budget}</div></div>
      <div class="info-item"><div class="lbl">公告日期</div><div class="val">${t.date || '—'}</div></div>
      <div class="info-item"><div class="lbl">截止投標</div><div class="val">${t.deadline || '—'}</div></div>
      <div class="info-item"><div class="lbl">類型</div><div class="val">${t.is_activity ? '活動相關' : '一般勞務'}</div></div>
      <div class="info-item" style="grid-column:1/-1"><div class="lbl">招標方式</div><div class="val">${t.recruit_type || '—'}</div></div>
    </div>
    <a class="ext-link" href="${t.url}" target="_blank">↗ 在採購網查看原始標案</a>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="switchTab(1)">
        ${ai ? '查看 AI 分析報告' : '進行 AI 分析'}
      </button>
      <button class="btn" style="flex:1" onclick="switchTab(2)">查看歷史得標</button>
    </div>`;
}

function renderTabHistory() {
  const t = currentTender;
  const history = t.history || [];

  if (!history.length) {
    document.getElementById('panel-body').innerHTML = `
      <div class="section-lbl" style="margin-top:0">歷史得標記錄</div>
      <div class="history-wrap">
        <div class="history-empty">查無前兩年決標記錄（可能為新標案，或標案名稱有變動）</div>
      </div>
      <p style="font-size:12px;color:var(--text3);margin-top:8px">歷史記錄於每次爬蟲執行時自動查詢更新。</p>`;
    return;
  }

  const rows = history.map(h => `
    <tr>
      <td><strong>${h.year}年</strong></td>
      <td>${h.winner || '—'}</td>
      <td>${h.award_price || '—'}</td>
      <td>${h.budget || '—'}</td>
    </tr>`).join('');

  document.getElementById('panel-body').innerHTML = `
    <div class="section-lbl" style="margin-top:0">前兩年歷史得標記錄</div>
    <div class="history-wrap">
      <table class="history-table">
        <thead>
          <tr>
            <th>年份</th>
            <th>得標廠商</th>
            <th>決標金額</th>
            <th>當年預算</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-top:8px">資料來源：政府採購網決標公告</p>`;
}

function renderTabAI() {
  const t = currentTender;
  const ai = aiResults[t.id];

  if (ai) {
    document.getElementById('panel-body').innerHTML = `
      <div class="verdict-banner verdict-${ai.verdict}">${ai.label}</div>
      <div class="section-lbl" style="margin-top:0">分析報告</div>
      <div class="analysis-block">${ai.text}</div>`;
    return;
  }

  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey || !apiKey.startsWith('sk-ant-')) {
    document.getElementById('panel-body').innerHTML = `
      <div class="analysis-block" style="color:var(--text3)">本標案尚未分析。\n\nGemma 3 本地分析已在爬蟲執行時自動完成，請重新載入資料。\n\n若要使用 Claude API 深度分析，請在左側輸入 API Key。</div>`;
    return;
  }

  document.getElementById('panel-body').innerHTML = `<div class="loading-row"><div class="spinner"></div> AI 分析中...</div>`;
  doAnalyze(t).then(() => {
    if (currentTender?.id === t.id && currentTab === 1) renderTabAI();
    updateStats();
    renderTable();
  });
}

async function doAnalyze(t) {
  const apiKey = document.getElementById('api-key').value.trim();
  const history = t.history || [];
  const histText = history.length
    ? history.map(h => `  ${h.year}年：得標廠商「${h.winner}」，決標金額 ${h.award_price}，預算 ${h.budget}`).join('\n')
    : '  查無前兩年決標記錄';

  const prompt = `你是有多年經驗的台灣政府採購顧問，請用繁體中文直接給出這個標案的投標判斷。
語氣要像業界老手在跟同事講話，不要官腔，重點放在「值不值得投」和「要注意什麼」。

【標案資訊】
名稱：${t.title}
機關：${t.org}（${t.town}）
預算：NT$ ${t.budget}
公告日期：${t.date || '—'}
截止投標：${t.deadline || '—'}
招標方式：${t.recruit_type || '—'}

【前兩年歷史得標】
${histText}

請依照以下格式回答，每點控制在1-2句，直接講重點：

【投標建議】建議投標 / 不建議投標 / 審慎評估

【預算評估】這個預算在市場上算合理嗎？夠不夠執行？

【得標廠商觀察】前幾年都是誰在得標？有沒有慣性得標廠商？新廠商有沒有機會？

【值得投的理由】
・理由1
・理由2

【要小心的地方】
・風險1
・風險2`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content?.[0]?.text || '（回覆為空）';
    tokenTotal += (data.usage?.input_tokens || 0) + (data.usage?.output_tokens || 0);
    document.getElementById('token-pill').style.display = '';
    document.getElementById('token-pill').textContent = `Token：${tokenTotal.toLocaleString()}`;
    aiResults[t.id] = parseAnalysis(text);
    document.getElementById('s-done').textContent = Object.keys(aiResults).length;
    document.getElementById('nc-analyzed').textContent = Object.keys(aiResults).length;
  } catch(e) {
    aiResults[t.id] = { text: `分析失敗：${e.message}`, label: '無法判斷', verdict: 'maybe' };
  }
}

async function analyzeSelected() {
  const toAnalyze = [...selected].filter(id => !aiResults[id]);
  if (!toAnalyze.length) { alert('所選標案皆已分析完成'); return; }
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey || !apiKey.startsWith('sk-ant-')) { alert('請先輸入 Claude API Key'); return; }
  document.getElementById('btn-bulk').disabled = true;
  document.getElementById('btn-bulk').textContent = '分析中...';
  for (const id of toAnalyze) {
    const t = ALL.find(x => x.id === id);
    if (t) await doAnalyze(t);
  }
  updateStats();
  renderTable();
  document.getElementById('btn-bulk').disabled = false;
  document.getElementById('btn-bulk').textContent = '批次 AI 分析 ↗';
}

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');
  const isOpen = sidebar.classList.contains('mobile-open');
  if (isOpen) {
    sidebar.classList.remove('mobile-open');
    backdrop.classList.remove('active');
  } else {
    sidebar.classList.add('mobile-open');
    backdrop.classList.add('active');
  }
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-backdrop').classList.remove('active');
}
document.addEventListener('DOMContentLoaded', () => {
  document.querySelector('.sidebar').addEventListener('click', (e) => {
    if (window.innerWidth <= 768 && e.target.closest('.nav-item')) {
      closeSidebar();
    }
  });
});

function saveKey() {
  const v = document.getElementById('api-key').value.trim();
  if (v) localStorage.setItem('claude_api_key', v);
  updateApiStatus();
}
function updateApiStatus() {
  const v = document.getElementById('api-key').value.trim();
  const el = document.getElementById('api-status');
  if (!v) { el.textContent = ''; return; }
  if (v.startsWith('sk-ant-')) {
    el.style.color = 'var(--green)'; el.textContent = '✓ Key 格式正確';
  } else {
    el.style.color = 'var(--red)'; el.textContent = '⚠ 格式有誤';
  }
}
</script>
</body>
</html>
