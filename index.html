<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雲林縣採購監控 v2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --sidebar: #131923;
  --surface: #161d2b;
  --surface2: #1c2537;
  --surface3: #232e44;
  --border: #263040;
  --border2: #334055;
  --text: #dce6f4;
  --text2: #7a90a8;
  --text3: #3f5060;
  --blue: #4f8ef7;
  --blue-bg: rgba(79,142,247,.12);
  --green: #28d87c;
  --green-bg: rgba(40,216,124,.11);
  --amber: #f0a830;
  --amber-bg: rgba(240,168,48,.11);
  --red: #f04860;
  --red-bg: rgba(240,72,96,.11);
  --shadow: 0 4px 24px rgba(0,0,0,.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; min-height: 100vh; }

/* === Layout === */
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 200px; min-width: 200px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }

/* === Sidebar === */
.logo { padding: 18px 14px 14px; border-bottom: 1px solid var(--border); }
.logo-badge { display: inline-block; background: var(--blue); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: .08em; margin-bottom: 8px; }
.logo-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
.logo-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }
.nav-group { padding: 12px 8px 4px; }
.nav-group-label { font-size: 9px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; font-weight: 600; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 7px; cursor: pointer; font-size: 12px; color: var(--text2); transition: background .12s, color .12s; margin-bottom: 1px; user-select: none; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--blue-bg); color: var(--blue); font-weight: 500; }
.nav-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.nav-count { margin-left: auto; font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--surface3); color: var(--text3); }
.nav-item.active .nav-count { background: rgba(79,142,247,.22); color: var(--blue); }
.sidebar-footer { margin-top: auto; padding: 12px 13px; border-top: 1px solid var(--border); }
.sidebar-footer label { font-size: 10px; color: var(--text3); display: block; margin-bottom: 5px; }
.api-input { width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 10px; font-family: 'SF Mono', monospace; background: var(--bg); color: var(--text); }
.api-input:focus { outline: none; border-color: var(--blue); }
.api-status { font-size: 10px; margin-top: 4px; min-height: 14px; }

/* === Topbar === */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 11px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.topbar-info { flex: 1; }
.topbar-title { font-size: 14px; font-weight: 600; color: var(--text); }
.topbar-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 7px; font-size: 12px; font-family: inherit; cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); transition: all .12s; white-space: nowrap; }
.btn:hover { background: var(--surface3); color: var(--text); }
.btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 500; }
.btn-primary:hover { opacity: .85; }
.btn-primary:disabled { opacity: .3; pointer-events: none; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.token-pill { font-size: 10px; padding: 3px 8px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--text3); }

/* === Content area === */
.content { flex: 1; overflow-y: auto; padding: 16px 20px 24px; }

/* === Stats === */
.stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 14px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 10px 14px; }
.stat .lbl { font-size: 9px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
.stat .val { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
.stat .sub { font-size: 10px; color: var(--text3); margin-top: 3px; }
.stat.stat-urgent .lbl { color: var(--red); }
.stat.stat-urgent.has-urgent { background: var(--red-bg); border-color: rgba(240,72,96,.28); }
.stat.stat-urgent.has-urgent .val { color: var(--red); }

/* === Spotlight === */
.spotlight { margin-bottom: 14px; }
.spotlight-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.spotlight-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; font-weight: 700; white-space: nowrap; }
.spotlight-rule { flex: 1; height: 1px; background: var(--border); }
.spotlight-cards { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scroll-snap-type: x mandatory; }
.spotlight-cards::-webkit-scrollbar { height: 3px; }
.spotlight-cards::-webkit-scrollbar-track { background: transparent; }
.spotlight-cards::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.scard { flex-shrink: 0; width: 216px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px 11px 16px; cursor: pointer; transition: background .14s, transform .14s, box-shadow .14s; scroll-snap-align: start; position: relative; overflow: hidden; }
.scard::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 9px 0 0 9px; }
.scard.v-yes::before { background: var(--green); }
.scard.v-no::before { background: var(--red); }
.scard.v-maybe::before { background: var(--amber); }
.scard.v-none::before { background: var(--border2); }
.scard:hover { background: var(--surface2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.35); }
.scard-verdict { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.scard.v-yes .scard-verdict { color: var(--green); }
.scard.v-no .scard-verdict { color: var(--red); }
.scard.v-maybe .scard-verdict { color: var(--amber); }
.scard.v-none .scard-verdict { color: var(--text3); }
.scard-title { font-size: 12px; color: var(--text); font-weight: 500; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
.scard-meta { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.scard-budget { font-size: 10px; color: var(--text2); }
.scard-dl { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.scard-dl.d-urgent { background: var(--red-bg); color: var(--red); }
.scard-dl.d-warning { background: var(--amber-bg); color: var(--amber); }
.scard-dl.d-safe { background: var(--green-bg); color: var(--green); }
.scard-dl.d-expired { background: var(--surface3); color: var(--text3); }

/* === Filter bar === */
.filter-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 9px 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
.filter-bar input[type=text] { flex: 1; min-width: 140px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--bg); color: var(--text); font-family: inherit; }
.filter-bar input[type=text]::placeholder { color: var(--text3); }
.filter-bar input[type=text]:focus { outline: none; border-color: var(--blue); }
.filter-bar select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--bg); color: var(--text); font-family: inherit; cursor: pointer; }
.filter-bar select:focus { outline: none; border-color: var(--blue); }
.filter-sep { width: 1px; background: var(--border); height: 18px; flex-shrink: 0; }

/* === Sel bar === */
.sel-bar { background: rgba(240,168,48,.07); border: 1px solid rgba(240,168,48,.22); border-radius: 9px; padding: 8px 13px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--amber); margin-bottom: 10px; }
.sel-bar .sp { flex: 1; }

/* === Table === */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
table { width: 100%; border-collapse: separate; border-spacing: 0; }
thead th { padding: 9px 12px; text-align: left; font-size: 9px; font-weight: 700; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; background: var(--surface2); border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { transition: background .1s; cursor: pointer; }
tbody tr:hover { background: var(--surface2); }
tbody tr + tr td { border-top: 1px solid var(--border); }

/* Urgency left border */
tbody td:first-child { padding-left: 0; }
.urge-bar { display: block; width: 3px; height: 100%; min-height: 44px; border-radius: 0; flex-shrink: 0; }
tbody td.td-urge { padding: 0; width: 3px; }
.urge-urgent { background: var(--red); }
.urge-warning { background: var(--amber); }
.urge-safe { background: var(--green); }
.urge-expired { background: var(--border); opacity: .5; }
tbody tr.u-expired { opacity: .5; }

tbody td { padding: 10px 12px; vertical-align: middle; }
tbody td.td-urge { padding: 0; }

.td-name .name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; }
.td-name .name.is-activity { color: #85b8ff; }
.td-name .org { font-size: 10px; color: var(--text3); margin-top: 2px; }
.hist-tag { display: inline-block; font-size: 9px; color: var(--blue); background: var(--blue-bg); padding: 1px 4px; border-radius: 3px; margin-left: 5px; vertical-align: middle; font-weight: 600; }

.td-town { font-size: 11px; color: var(--text2); white-space: nowrap; }

.td-budget { white-space: nowrap; }
.budget-val { font-size: 12px; font-weight: 600; color: var(--text); }
.budget-bar-wrap { margin-top: 3px; height: 2px; background: var(--surface3); border-radius: 1px; width: 72px; overflow: hidden; }
.budget-bar-fill { height: 100%; background: var(--blue); border-radius: 1px; opacity: .45; }

.td-dl { white-space: nowrap; }
.dl-days { font-size: 12px; font-weight: 700; line-height: 1; }
.dl-days.d-urgent { color: var(--red); }
.dl-days.d-warning { color: var(--amber); }
.dl-days.d-safe { color: var(--green); }
.dl-days.d-expired { color: var(--text3); }
.dl-date { font-size: 10px; color: var(--text3); margin-top: 3px; }

.badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; letter-spacing: .02em; white-space: nowrap; }
.badge-activity { background: var(--blue-bg); color: var(--blue); }
.badge-other { background: var(--surface3); color: var(--text3); }
.badge-yes { background: var(--green-bg); color: var(--green); }
.badge-no { background: var(--red-bg); color: var(--red); }
.badge-maybe { background: var(--amber-bg); color: var(--amber); }

.btn-view { font-size: 10px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border2); color: var(--text2); background: transparent; cursor: pointer; font-family: inherit; transition: all .12s; }
.btn-view:hover { background: var(--blue); border-color: var(--blue); color: #fff; }
.chk { width: 14px; height: 14px; cursor: pointer; accent-color: var(--blue); }
.empty-state { padding: 48px; text-align: center; color: var(--text3); font-size: 13px; }

/* === Panel === */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s; backdrop-filter: blur(3px); }
.overlay.open { opacity: 1; pointer-events: auto; }
.panel { position: fixed; top: 0; right: 0; bottom: 0; width: 540px; max-width: 95vw; background: var(--sidebar); border-left: 1px solid var(--border); box-shadow: -8px 0 48px rgba(0,0,0,.55); z-index: 101; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); }
.panel.open { transform: none; }
.panel-head { padding: 15px 18px 11px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.panel-head .close { float: right; background: var(--surface2); border: 1px solid var(--border); font-size: 12px; cursor: pointer; color: var(--text2); padding: 4px 9px; border-radius: 6px; }
.panel-head .close:hover { color: var(--text); background: var(--surface3); }
.panel-head h2 { font-size: 13px; font-weight: 500; padding-right: 44px; line-height: 1.5; color: var(--text); }
.panel-head .meta { font-size: 10px; color: var(--text3); margin-top: 5px; }
.panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.panel-tab { flex: 1; padding: 9px; text-align: center; font-size: 11px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .12s; }
.panel-tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.panel-body { flex: 1; overflow-y: auto; padding: 16px 18px; }

.verdict-banner { border-radius: 9px; padding: 11px 15px; margin-bottom: 14px; font-size: 13px; font-weight: 600; }
.verdict-yes { background: var(--green-bg); color: var(--green); border: 1px solid rgba(40,216,124,.22); }
.verdict-no { background: var(--red-bg); color: var(--red); border: 1px solid rgba(240,72,96,.22); }
.verdict-maybe { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(240,168,48,.22); }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }
.info-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; }
.info-item .lbl { font-size: 9px; color: var(--text3); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
.info-item .val { font-size: 12px; font-weight: 500; color: var(--text); }
.section-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; margin-top: 14px; font-weight: 700; }

.history-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
.history-table { width: 100%; border-collapse: collapse; }
.history-table th { background: var(--surface3); padding: 7px 10px; text-align: left; font-size: 9px; color: var(--text3); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }
.history-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 11px; }
.history-table tr:last-child td { border-bottom: none; }
.history-empty { padding: 12px 14px; font-size: 12px; color: var(--text3); font-style: italic; }

.analysis-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 14px 16px; font-size: 12px; line-height: 1.9; white-space: pre-wrap; color: var(--text); }
.ext-link { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--blue); text-decoration: none; margin-top: 10px; }
.ext-link:hover { text-decoration: underline; }

.spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-row { display: flex; align-items: center; gap: 10px; padding: 16px 0; font-size: 12px; color: var(--text3); }

.page-loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 200; }
.page-loading .sp { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
.page-loading p { font-size: 13px; color: var(--text3); }

/* === Mobile === */
.hamburger { display: none; flex-direction: column; justify-content: center; gap: 4px; cursor: pointer; padding: 6px; border: 1px solid var(--border); background: var(--surface2); border-radius: 7px; flex-shrink: 0; }
.hamburger span { display: block; width: 16px; height: 2px; background: var(--text2); border-radius: 1px; }
.sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 140; cursor: pointer; }
.sidebar-backdrop.active { display: block; }

@media (max-width: 960px) { .stats { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 768px) {
  .hamburger { display: flex; }
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 150; transform: translateX(-100%); transition: transform .25s cubic-bezier(.4,0,.2,1); box-shadow: 4px 0 24px rgba(0,0,0,.5); }
  .sidebar.mobile-open { transform: none; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .topbar, .content { padding: 10px 14px; }
  .panel { width: 100%; max-width: 100%; }
  .info-grid { grid-template-columns: 1fr; }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .filter-bar input[type=text] { width: 100%; }
  .filter-sep { display: none; }
  .table-wrap { overflow-x: auto; }
  table { min-width: 580px; }
}
@media (max-width: 480px) {
  .stats { grid-template-columns: repeat(2, 1fr); gap: 6px; }
  table { min-width: 400px; }
  thead th:nth-child(3), tbody td:nth-child(3),
  thead th:nth-child(8), tbody td:nth-child(8) { display: none; }
}

/* === Toast === */
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 12px 18px; border-radius: 10px; font-size: 13px; z-index: 9999; max-width: 340px; line-height: 1.6; box-shadow: 0 4px 24px rgba(0,0,0,.5); white-space: pre-wrap; opacity: 0; transition: opacity .3s; pointer-events: none; }
#toast.show { opacity: 1; }

/* === Progress Panel === */
#progress-panel {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 20px 12px; z-index: 500;
  box-shadow: 0 -4px 24px rgba(0,0,0,.4);
}
#progress-panel.visible { display: block; }
.pp-bar-track {
  width: 100%; height: 4px; background: var(--surface3);
  border-radius: 2px; overflow: hidden; margin-bottom: 7px;
}
.pp-bar-fill {
  height: 100%; background: var(--blue);
  border-radius: 2px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 8px rgba(79,142,247,.5);
}
.pp-bar-fill.pp-done { background: var(--green); box-shadow: 0 0 8px rgba(40,216,124,.5); }
.pp-bar-fill.pp-error { background: var(--red); box-shadow: none; }
.pp-info { display: flex; align-items: center; gap: 10px; font-size: 11px; }
.pp-pct { font-size: 13px; font-weight: 700; color: var(--blue); min-width: 36px; }
.pp-pct.pp-done { color: var(--green); }
.pp-pct.pp-error { color: var(--red); }
.pp-msg { color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pp-time { color: var(--text3); white-space: nowrap; font-size: 10px; }
</style>
</head>
<body>

<!-- Lock screen -->
<div id="lock-screen" style="position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#161d2b;border:1px solid #263040;border-radius:14px;padding:36px 40px;width:320px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.6)">
    <div style="display:inline-block;background:#4f8ef7;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.08em;margin-bottom:12px">PROCUREMENT MONITOR</div>
    <div style="font-size:20px;font-weight:700;color:#dce6f4;margin-bottom:4px">雲林縣採購監控</div>
    <div style="font-size:12px;color:#3f5060;margin-bottom:24px">請輸入密碼</div>
    <input id="pw-input" type="password" placeholder="密碼" onkeydown="if(event.key==='Enter')checkPw()"
      style="width:100%;padding:10px 14px;border:1px solid #263040;border-radius:8px;font-size:14px;font-family:inherit;background:#0d1117;color:#dce6f4;outline:none;box-sizing:border-box;margin-bottom:8px">
    <div id="pw-error" style="font-size:12px;color:#f04860;margin-bottom:10px;min-height:16px"></div>
    <button onclick="checkPw()" style="width:100%;padding:10px;background:#4f8ef7;border:none;border-radius:8px;color:#fff;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;letter-spacing:.02em">進入</button>
  </div>
</div>

<script>
(function(){
  const HASH = '56116e9ca720684c714b68f1420dde3bc1a492e9b61f58c1a036d4d2d1c12df1';
  function sha256(str) {
    const buf = new TextEncoder().encode(str);
    return crypto.subtle.digest('SHA-256', buf).then(h =>
      Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')
    );
  }
  function checkPw() {
    const pw = document.getElementById('pw-input').value;
    sha256(pw).then(hash => {

function parseAnalysis(text) {
  if (!text) return null;
  const m = text.match(/【投標建議】\s*(.+)/) || text.match(/【競標建議】\s*(.+)/);
  const label = m ? m[1].trim() : '審慎評估';
  const verdict = label.includes('不建議') ? 'no' : label.includes('建議投標') ? 'yes' : 'maybe';
  return { text, label, verdict };
}

function parseBudget(s) { if (!s) return 0; return parseInt(s.replace(/[^0-9]/g, '')) || 0; }

/* === Spotlight === */
function renderSpotlight() {
  const actives = ALL.filter(t => t.is_activity);
  const wrap = document.getElementById('spotlight-wrap');
  if (!actives.length || (currentView === 'analyzed')) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  const cards = actives.map(t => {
    const ai = aiResults[t.id];
    const verdict = ai ? ai.verdict : 'none';
    const verdictLabel = ai ? ai.label : '未分析';
    const days = daysUntil(t.deadline);
    const uk = urgencyKey(days);
    const dlClass = `d-${uk === 'none' ? 'expired' : uk}`;
    const dlLabel = deadlineLabel(days);
    const budgetShort = parseBudget(t.budget) >= 1000000
      ? (parseBudget(t.budget) / 1000000).toFixed(1) + '百萬'
      : 'NT$ ' + t.budget;
    return `<div class="scard v-${verdict}" onclick="openPanel('${t.id}')">
      <div class="scard-verdict">${verdictLabel}</div>
      <div class="scard-title">${t.title}</div>
      <div class="scard-meta">
        <span class="scard-budget">${budgetShort}</span>
        <span class="scard-dl ${dlClass}">${dlLabel}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('spotlight-cards').innerHTML = cards;
}

    if (ft && t.town !== ft) return false;
    if (kw && !t.title.toLowerCase().includes(kw) && !t.org.includes(kw)) return false;
    if (fb) {
      const b = parseBudget(t.budget);
      if (fb === '100' && b > 1000000) return false;
      if (fb === '500' && (b <= 1000000 || b > 5000000)) return false;
      if (fb === '1000' && (b <= 5000000 || b > 10000000)) return false;
      if (fb === '9999' && b <= 10000000) return false;
    }
    return true;
  });
}

function setView(v) {
  currentView = v; currentTown = '';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + v)?.classList.add('active');
  document.querySelectorAll('.town-nav-item').forEach(el => el.classList.remove('active'));
  renderSpotlight(); updateViewTitle(); renderTable();
}
function filterTown(town) {
  currentTown = town; currentView = 'all';
  document.querySelectorAll('.nav-item, .town-nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-town-' + town)?.classList.add('active');
  renderSpotlight(); updateViewTitle(); renderTable();
}
function updateViewTitle() {
  const titles = { all: '全部勞務標案', activity: '活動相關標案', analyzed: '已 AI 分析' };
  document.getElementById('view-title').textContent = currentTown ? currentTown + ' 標案' : (titles[currentView] || '全部標案');
}

/* === Table rendering === */
function renderTable() {
  const rows = getFiltered();
  const tbody = document.getElementById('tbody');
  document.getElementById('sel-bar').style.display = ALL.length ? 'flex' : 'none';
  document.getElementById('view-sub').textContent = `顯示 ${rows.length} 筆`;
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state">${ALL.length ? '無符合條件的標案' : '尚無資料，請執行 pcc_crawler.py'}</div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(t => {
    const ai = aiResults[t.id];
    const isChk = selected.has(t.id);
    const days = daysUntil(t.deadline);
    const uk = urgencyKey(days);
    const dlClass = `d-${uk === 'none' ? 'expired' : uk}`;
    const barW = Math.max(4, Math.round(parseBudget(t.budget) / MAX_BUDGET * 100));
    const histTag = (t.history && t.history.length > 0) ? `<span class="hist-tag">${t.history.length}年記錄</span>` : '';
    const actBadge = t.is_activity ? '<span class="badge badge-activity">活動</span>' : '<span class="badge badge-other">一般</span>';
    const aiBadge = ai ? `<span class="badge badge-${ai.verdict}">${ai.label}</span>` : '<span style="color:var(--text3);font-size:11px">—</span>';
    return `<tr class="u-${uk}" onclick="openPanel('${t.id}')">
      <td class="td-urge"><span class="urge-bar urge-${uk}"></span></td>
      <td onclick="event.stopPropagation()"><input type="checkbox" class="chk" ${isChk?'checked':''} onchange="toggleSel('${t.id}',this.checked)"></td>
      <td class="td-name"><div class="name${t.is_activity?' is-activity':''}">${t.title}${histTag}</div><div class="org">${t.org}</div></td>
      <td class="td-town">${t.town}</td>
      <td class="td-budget"><div class="budget-val">NT$ ${t.budget}</div><div class="budget-bar-wrap"><div class="budget-bar-fill" style="width:${barW}%"></div></div></td>
      <td class="td-dl"><div class="dl-days ${dlClass}">${deadlineLabel(days)}</div><div class="dl-date">${formatMDDate(t.deadline)}</div></td>
      <td>${actBadge}</td>
      <td>${aiBadge}</td>
      <td onclick="event.stopPropagation()"><button class="btn-view" onclick="openPanel('${t.id}')">查看</button></td>
    </tr>`;
  }).join('');
  updateSelCount();
}

function toggleSel(id, checked) { if (checked) selected.add(id); else selected.delete(id); updateSelCount(); }
function toggleAll(checked) { getFiltered().forEach(t => checked ? selected.add(t.id) : selected.delete(t.id)); renderTable(); }
function selectAll() { getFiltered().forEach(t => selected.add(t.id)); document.getElementById('chk-all').checked = true; renderTable(); }
function clearSel() { selected.clear(); document.getElementById('chk-all').checked = false; renderTable(); }
function updateSelCount() {
  const n = selected.size;
  document.getElementById('s-sel').textContent = n;
  document.getElementById('sel-label').textContent = `已選 ${n} 筆`;
  document.getElementById('btn-bulk').disabled = n === 0;
}

function updateStats() {
  const urgentCount = ALL.filter(t => { const d = daysUntil(t.deadline); return d !== null && d >= 0 && d <= 3; }).length;
  document.getElementById('s-total').textContent = ALL.length;
  document.getElementById('s-activity').textContent = ALL.filter(t => t.is_activity).length;
  document.getElementById('s-urgent').textContent = urgentCount;
  document.getElementById('s-done').textContent = Object.keys(aiResults).length;
  const urgentCard = document.getElementById('stat-urgent');
  urgentCard.classList.toggle('has-urgent', urgentCount > 0);
  document.getElementById('nc-all').textContent = ALL.length;
  document.getElementById('nc-activity').textContent = ALL.filter(t => t.is_activity).length;
  document.getElementById('nc-analyzed').textContent = Object.keys(aiResults).length;
}

function buildTownFilter() {
  const towns = [...new Set(ALL.map(t => t.town))].sort();
  const counts = {};
  ALL.forEach(t => counts[t.town] = (counts[t.town] || 0) + 1);
  document.getElementById('town-nav').innerHTML = towns.map(town =>
    `<div class="nav-item town-nav-item" id="nav-town-${town}" onclick="filterTown('${town}')"><span class="nav-dot"></span>${town}<span class="nav-count">${counts[town]}</span></div>`
  ).join('');
  const sel = document.getElementById('f-town');
  towns.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o); });
}

/* === Panel === */
function openPanel(id) {
  currentTender = ALL.find(t => t.id === id);
  if (!currentTender) return;
  document.getElementById('p-title').textContent = currentTender.title;
  const days = daysUntil(currentTender.deadline);
  const dlInfo = days !== null ? `　截止：${currentTender.deadline}（${deadlineLabel(days)}）` : '';
  document.getElementById('p-meta').textContent = currentTender.org + dlInfo;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  switchTab(0);
}
function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}
function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.panel-tab').forEach((el, i) => el.classList.toggle('active', i === idx));
  if (!currentTender) return;
  if (idx === 0) renderTabInfo();
  else if (idx === 1) renderTabAI();
  else renderTabHistory();
}
function renderTabInfo() {
  const t = currentTender;
  const ai = aiResults[t.id];
  const days = daysUntil(t.deadline);
  const uk = urgencyKey(days);
  const dlClass = `d-${uk === 'none' ? 'expired' : uk}`;
  document.getElementById('panel-body').innerHTML = `
    ${ai ? `<div class="verdict-banner verdict-${ai.verdict}">${ai.label}</div>` : ''}
    <div class="info-grid">
      <div class="info-item"><div class="lbl">機關</div><div class="val">${t.org}</div></div>
      <div class="info-item"><div class="lbl">鄉鎮</div><div class="val">${t.town}</div></div>
      <div class="info-item"><div class="lbl">預算金額</div><div class="val">NT$ ${t.budget}</div></div>
      <div class="info-item"><div class="lbl">公告日期</div><div class="val">${t.date || '—'}</div></div>
      <div class="info-item"><div class="lbl">截止投標</div><div class="val"><span class="${dlClass}" style="font-weight:600">${t.deadline || '—'}</span>${days !== null ? `　<span class="${dlClass}" style="font-size:11px">${deadlineLabel(days)}</span>` : ''}</div></div>
      <div class="info-item"><div class="lbl">類型</div><div class="val">${t.is_activity ? '✦ 活動相關' : '一般勞務'}</div></div>
      <div class="info-item" style="grid-column:1/-1"><div class="lbl">招標方式</div><div class="val">${t.recruit_type || '—'}</div></div>
    </div>
    <a class="ext-link" href="${t.url}" target="_blank">↗ 在採購網查看原始標案</a>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="switchTab(1)">${ai ? '查看 AI 分析報告' : '進行 AI 分析'}</button>
      <button class="btn" style="flex:1" onclick="switchTab(2)">查看歷史得標</button>
    </div>`;
}
function renderTabHistory() {
  const t = currentTender;
  const history = t.history || [];
  if (!history.length) {
    document.getElementById('panel-body').innerHTML = `
      <div class="section-lbl" style="margin-top:0">歷史得標記錄</div>
      <div class="history-wrap"><div class="history-empty">查無前兩年決標記錄（可能為新標案，或標案名稱有變動）</div></div>`;
    return;
  }
  const rows = history.map(h => `<tr><td><strong>${h.year}年</strong></td><td>${h.winner || '—'}</td><td>${h.award_price || '—'}</td><td>${h.budget || '—'}</td></tr>`).join('');
  document.getElementById('panel-body').innerHTML = `
    <div class="section-lbl" style="margin-top:0">前兩年歷史得標記錄</div>
    <div class="history-wrap">
      <table class="history-table">
        <thead><tr><th>年份</th><th>得標廠商</th><th>決標金額</th><th>當年預算</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p style="font-size:11px;color:var(--text3);margin-top:8px">資料來源：政府採購網決標公告</p>`;
}
function renderTabAI() {
  const t = currentTender;
  const ai = aiResults[t.id];
  if (ai) {
    document.getElementById('panel-body').innerHTML = `
      <div class="verdict-banner verdict-${ai.verdict}">${ai.label}</div>
      <div class="section-lbl" style="margin-top:0">分析報告</div>
      <div class="analysis-block">${ai.text}</div>`;
    return;
  }
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey || !apiKey.startsWith('sk-ant-')) {
    document.getElementById('panel-body').innerHTML = `<div class="analysis-block" style="color:var(--text3)">本標案尚未分析。\n\nGemma 3 本地分析已在爬蟲執行時自動完成，請重新載入資料。\n\n若要使用 Claude API 深度分析，請在左側輸入 API Key。</div>`;
    return;
  }
  document.getElementById('panel-body').innerHTML = `<div class="loading-row"><div class="spinner"></div> AI 分析中...</div>`;
  doAnalyze(t).then(() => { if (currentTender?.id === t.id && currentTab === 1) renderTabAI(); updateStats(); renderTable(); });
}

async function doAnalyze(t) {
  const apiKey = document.getElementById('api-key').value.trim();
  const history = t.history || [];
  const histText = history.length
    ? history.map(h => `  ${h.year}年：得標廠商「${h.winner}」，決標金額 ${h.award_price}`).join('\n')
    : '  查無前兩年決標記錄';
  const prompt = `你是台灣政府採購老手，用繁體中文回答，語氣直接像跟同事說話，不要廢話。
嚴格按照以下格式回答，每個項目最多2句：

【投標建議】建議投標 / 不建議投標 / 審慎評估（三選一）
【預算評估】預算夠不夠用？合不合理？
【得標廠商觀察】誰在得標？新廠商有沒有機會？
【值得投的理由】
・理由1
・理由2
【要小心的地方】
・風險1
・風險2

名稱：${t.title}
機關：${t.org}（${t.town}）
預算：NT$ ${t.budget}
公告：${t.date || '—'} 截止：${t.deadline || '—'}
歷史得標：
${histText}`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 800, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content?.[0]?.text || '（回覆為空）';
    tokenTotal += (data.usage?.input_tokens || 0) + (data.usage?.output_tokens || 0);
    document.getElementById('token-pill').style.display = '';
    document.getElementById('token-pill').textContent = `Token：${tokenTotal.toLocaleString()}`;
    aiResults[t.id] = parseAnalysis(text);
    document.getElementById('s-done').textContent = Object.keys(aiResults).length;
    document.getElementById('nc-analyzed').textContent = Object.keys(aiResults).length;
  } catch(e) {
    aiResults[t.id] = { text: `分析失敗：${e.message}`, label: '無法判斷', verdict: 'maybe' };
  }
}

async function analyzeSelected() {
  const toAnalyze = [...selected].filter(id => !aiResults[id]);
  if (!toAnalyze.length) { alert('所選標案皆已分析完成'); return; }
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey || !apiKey.startsWith('sk-ant-')) { alert('請先輸入 Claude API Key'); return; }
  document.getElementById('btn-bulk').disabled = true;
  document.getElementById('btn-bulk').textContent = '分析中...';
  for (const id of toAnalyze) { const t = ALL.find(x => x.id === id); if (t) await doAnalyze(t); }
  updateStats(); renderSpotlight(); renderTable();
  document.getElementById('btn-bulk').disabled = false;
  document.getElementById('btn-bulk').textContent = '批次 AI 分析 ↗';
}

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');
  const isOpen = sidebar.classList.contains('mobile-open');
  if (isOpen) { sidebar.classList.remove('mobile-open'); backdrop.classList.remove('active'); }
  else { sidebar.classList.add('mobile-open'); backdrop.classList.add('active'); }
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-backdrop').classList.remove('active');
}
document.addEventListener('DOMContentLoaded', () => {
  document.querySelector('.sidebar').addEventListener('click', (e) => {
    if (window.innerWidth <= 768 && e.target.closest('.nav-item')) closeSidebar();
  });
});
function saveKey() {
  const v = document.getElementById('api-key').value.trim();
  if (v) localStorage.setItem('claude_api_key', v);
  updateApiStatus();
}
function updateApiStatus() {
  const v = document.getElementById('api-key').value.trim();
  const el = document.getElementById('api-status');
  if (!v) { el.textContent = ''; return; }
  if (v.startsWith('sk-ant-')) { el.style.color = 'var(--green)'; el.textContent = '✓ Key 格式正確'; }
  else { el.style.color = 'var(--red)'; el.textContent = '⚠ 格式有誤'; }
}
/* === Refresh button === */
let _refreshStart = 0;

async function triggerRefresh() {
  const btn = document.getElementById('btn-refresh');
  const isServer = window.location.protocol === 'http:' && window.location.hostname === 'localhost';
  if (!isServer) {
    showToast('請先在終端機執行：\n  python3 server.py\n然後從 http://localhost:8080 開啟此頁面，\n就可以用此按鈕直接更新資料。', 8000);
    return;
  }
  btn.disabled = true;
  btn.textContent = '啟動中...';
  try {
    const r = await fetch('/api/refresh', { method: 'POST' });
    if (!r.ok && r.status !== 409) throw new Error('HTTP ' + r.status);
    _refreshStart = Date.now();
    showProgress(2, '連線 PCC 中...');
    pollStatus();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '↺ 重新獲取最新標案';
    showToast('無法連接伺服器：' + e.message);
  }
}

function pollStatus() {
  const btn = document.getElementById('btn-refresh');
  const iv = setInterval(async () => {
    try {
      const r = await fetch('/api/status');
      const s = await r.json();
      const pct = s.progress || 0;
      const msg = s.message || '執行中...';
      // 用伺服器給的 started_at 計算更精確的時間
      if (s.started_at && s.started_at > 0) _refreshStart = s.started_at * 1000;
      showProgress(pct, msg, s.state);
      btn.textContent = pct > 0 ? `${pct}% 抓取中...` : '執行中...';

      if (s.state === 'done') {
        clearInterval(iv);
        showProgress(100, s.message, 'done');
        btn.textContent = '✓ 完成，重新載入中...';
        setTimeout(() => window.location.reload(), 2000);
      } else if (s.state === 'error') {
        clearInterval(iv);
        hideProgress();
        btn.disabled = false;
        btn.textContent = '↺ 重新獲取最新標案';
        showToast('更新失敗：\n' + s.message, 8000);
      }
    } catch(e) { /* 繼續輪詢 */ }
  }, 2000);
}

function showProgress(pct, msg, state) {
  const panel = document.getElementById('progress-panel');
  const bar   = document.getElementById('pp-bar');
  const pctEl = document.getElementById('pp-pct');
  const msgEl = document.getElementById('pp-msg');
  const timeEl = document.getElementById('pp-time');
  panel.classList.add('visible');
  bar.style.width = pct + '%';
  pctEl.textContent = pct + '%';
  msgEl.textContent = msg;
  // 顏色狀態
  bar.className = 'pp-bar-fill' + (state === 'done' ? ' pp-done' : state === 'error' ? ' pp-error' : '');
  pctEl.className = 'pp-pct' + (state === 'done' ? ' pp-done' : state === 'error' ? ' pp-error' : '');
  // 預估剩餘時間
  timeEl.textContent = estimateTime(pct, state);
}

function estimateTime(pct, state) {
  if (state === 'done') return '已完成';
  if (state === 'error') return '';
  if (pct <= 0) return '估算中...';
  const elapsed = (Date.now() - _refreshStart) / 1000;
  if (elapsed < 5) return '估算中...';
  const estimatedTotal = elapsed / (pct / 100);
  const remaining = Math.max(0, estimatedTotal - elapsed);
  if (remaining < 10) return '即將完成';
  const m = Math.floor(remaining / 60);
  const s = Math.round(remaining % 60);
  return m > 0 ? `預計還需 ${m} 分 ${s} 秒` : `預計還需 ${s} 秒`;
}

function hideProgress() {
  document.getElementById('progress-panel').classList.remove('visible');
}

function showToast(msg, duration=4000) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), duration);
}
